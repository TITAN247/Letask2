services:
  - type: web
    name: letask
    runtime: node
    plan: standard
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_PUBLIC_APP_URL
        sync: false  # Will be auto-populated with service URL
      - key: MONGODB_URI
        sync: false  # Add your MongoDB connection string in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Auto-generates a secure secret
      - key: GOOGLE_CLIENT_ID
        sync: false  # Add in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Add in Render dashboard
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false  # Will be auto-populated
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: AGORA_APP_ID
        sync: false
